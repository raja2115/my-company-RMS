<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMS MultiTech | Under Update</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #06070b;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #0ea5e9;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Spheres */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }

        .glow-1 {
            background: radial-gradient(circle, var(--primary) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 15%;
            animation: pulseGlow 8s infinite alternate;
        }

        .glow-2 {
            background: radial-gradient(circle, var(--secondary) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 15%;
            animation: pulseGlow 10s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.12; }
            100% { transform: scale(1.2) translate(30px, -30px); opacity: 0.22; }
        }

        /* Grid Background overlay */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 2;
        }

        /* Container */
        .container {
            max-width: 520px;
            width: 90%;
            text-align: center;
            padding: 48px;
            background: rgba(13, 16, 27, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            z-index: 3;
            position: relative;
            animation: containerShow 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerShow {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.01em;
            margin-bottom: 32px;
            display: inline-block;
        }

        .logo-accent {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .spinner-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .spinner {
            position: relative;
            width: 72px;
            height: 72px;
        }

        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .spinner-ring:nth-child(2) {
            border-top-color: var(--secondary);
            animation-delay: 0.3s;
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 40%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 99px;
            overflow: hidden;
            width: 100%;
            margin-bottom: 24px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 99px;
            position: absolute;
            animation: loadingProgress 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes loadingProgress {
            0% { left: -35%; }
            100% { left: 100%; }
        }

        .meta-info {
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.8;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--secondary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--secondary);
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <a href="#" class="logo">
            <span class="logo-accent">RMS</span> MultiTech
        </a>

        <div class="spinner-container">
            <div class="spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
        </div>

        <h1>Site Will Open Soon</h1>
        <p>The website is currently undergoing live content updates by the administrator. It will be back online shortly with new services, products, and information.</p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="meta-info">
            <span class="status-dot"></span> Under Updation Process
        </div>

        <div class="footer">
            &copy; 2026 RMS MultiTech. All Rights Reserved. Founded by Raja Meenakshi Sundaram G.
        </div>
    </div>
</body>
</html>
